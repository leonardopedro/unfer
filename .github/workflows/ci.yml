name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # CPU-only: the `cuda` feature is never enabled in CI. All acceptance
  # criteria in docs/IMPLEMENTATION_PLAN.md run on CPU.

jobs:
  # ---------------------------------------------------------------------------
  # Core: the unfer kernel workspace must build, lint and test on CPU.
  # This locks in the per-crate baselines recorded in IMPLEMENTATION_PLAN.md.
  # ---------------------------------------------------------------------------
  test:
    name: workspace test (CPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build
        run: cargo build --workspace --verbose
      - name: cargo test
        run: cargo test --workspace --verbose

  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # ---------------------------------------------------------------------------
  # Integration spine: build the FFI as a shared lib and assert the uk_* C ABI
  # symbols are exported (the contract the australVM JIT links against).
  # ---------------------------------------------------------------------------
  ffi-symbols:
    name: unfer_ffi C ABI symbols
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p unfer_ffi
      - name: assert 18 uk_* symbols match EXPECTED_SYMBOLS.txt
        run: |
          nm -D --defined-only target/release/libunfer_ffi.so \
            | awk '/ T uk_/ {print $3}' | sort > /tmp/got_uk.txt
          if ! diff -u unfer_ffi/EXPECTED_SYMBOLS.txt /tmp/got_uk.txt; then
            echo "FAIL: uk_* symbols mismatch (see diff above)." >&2
            echo "If you added/removed a uk_* symbol, update unfer_ffi/EXPECTED_SYMBOLS.txt." >&2
            exit 1
          fi
          echo "All 18 uk_* symbols match EXPECTED_SYMBOLS.txt."
      - run: cargo build --release -p unfer_ffi --features zenodo
      - name: assert 5 uz_* symbols match EXPECTED_SYMBOLS_ZENODO.txt (zenodo feature)
        run: |
          nm -D --defined-only target/release/libunfer_ffi.so \
            | awk '/ T uz_/ {print $3}' | sort > /tmp/got_uz.txt
          if ! diff -u unfer_ffi/EXPECTED_SYMBOLS_ZENODO.txt /tmp/got_uz.txt; then
            echo "FAIL: uz_* symbols mismatch (see diff above)." >&2
            echo "If you added/removed a uz_* symbol, update unfer_ffi/EXPECTED_SYMBOLS_ZENODO.txt." >&2
            exit 1
          fi
          echo "All 5 uz_* symbols match EXPECTED_SYMBOLS_ZENODO.txt."

  # ---------------------------------------------------------------------------
  # End-to-end demo gate (the architecture's central claim): an Austral module
  # JIT-compiled by australVM/safestos calls the unfer kernel in-process, and
  # the manifest auth gate denies a revoked grant (UK-4001).
  #
  # Requires the sibling australVM checkout + the OCaml/dune toolchain. If the
  # australVM repo is private, add a PAT secret and set `token:` on its checkout.
  # Layout matters: run_demo.sh expects $ROOT/{unfer,australVM}.
  # ---------------------------------------------------------------------------
  demo-e2e:
    name: demo_module end-to-end (Austral JIT + UK-4001)
    runs-on: ubuntu-latest
    steps:
      - name: checkout unfer (sibling layout)
        uses: actions/checkout@v4
        with:
          path: unfer
      - name: checkout australVM (sibling)
        uses: actions/checkout@v4
        with:
          repository: leonardopedro/australVM
          path: australVM
          # P9 P13: PAT support for private repos. If australVM is
          # private, set the AUSTRALVM_TOKEN secret (Settings →
          # Secrets → New repository secret, scope: this repo) and
          # uncomment the next line. The job still works for the
          # public repo without the token (GitHub's GITHUB_TOKEN
          # doesn't have access to sibling private repos).
          # token: ${{ secrets.AUSTRALVM_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            unfer
            australVM/safestos/cranelift
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "4.13"
      - name: install australVM OCaml deps
        working-directory: australVM
        run: opam install . --deps-only --yes || true
      - name: run end-to-end demo
        working-directory: unfer
        run: bash demo_module/run_demo.sh

  # ---------------------------------------------------------------------------
  # QFM module gate: the Quantum Flow Matching Austral module JIT-creates a
  # `qfm_mehler` model, evolves it, and reads a data-channel probability in-
  # process (the physics claim). Auth gate mirrors demo-e2e (UK-4001).
  # ---------------------------------------------------------------------------
  qfm-e2e:
    name: qfm_module end-to-end (QFM Austral JIT + UK-4001)
    runs-on: ubuntu-latest
    steps:
      - name: checkout unfer (sibling layout)
        uses: actions/checkout@v4
        with:
          path: unfer
      - name: checkout australVM (sibling)
        uses: actions/checkout@v4
        with:
          repository: leonardopedro/australVM
          path: australVM
          # token: ${{ secrets.AUSTRALVM_TOKEN }}   # uncomment if private
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            unfer
            australVM/safestos/cranelift
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "4.13"
      - name: install australVM OCaml deps
        working-directory: australVM
        run: opam install . --deps-only --yes || true
      - name: run QFM module demo
        working-directory: unfer
        run: bash qfm_module/run_demo.sh

  # ---------------------------------------------------------------------------
  # QFM-TSR module gate: the QFM Tomographic Subspace Recovery Austral module
  # JIT-creates a `qfm_tomography` model, runs the 4-phase generate on a
  # query, and reads back the generated image (uk_get_result). Exercises the
  # F4 architecture end-to-end (rev 15). Auth gate mirrors demo-e2e (UK-4001).
  # ---------------------------------------------------------------------------
  qfm-tomo-e2e:
    name: qfm_tomo_module end-to-end (QFM-TSR Austral JIT + UK-4001)
    runs-on: ubuntu-latest
    steps:
      - name: checkout unfer (sibling layout)
        uses: actions/checkout@v4
        with:
          path: unfer
      - name: checkout australVM (sibling)
        uses: actions/checkout@v4
        with:
          repository: leonardopedro/australVM
          path: australVM
          # token: ${{ secrets.AUSTRALVM_TOKEN }}   # uncomment if private
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            unfer
            australVM/safestos/cranelift
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "4.13"
      - name: install australVM OCaml deps
        working-directory: australVM
        run: opam install . --deps-only --yes || true
      - name: run QFM-TSR module demo
        working-directory: unfer
        run: bash qfm_tomo_module/run_demo.sh

  # ---------------------------------------------------------------------------
  # Bayesian Update module gate: the Quantum Bayesian Update on the
  # TSR-evolved prior Austral module JIT-creates a `qfm_tomography` model
  # (P6 G SIRK-whitened basis, krylov_dim=K_2=4), runs a single Bayesian
  # update (uk_bayesian_update) on a single observation, and reads back
  # the HMC-decoded image (uk_get_result). Exercises the P6 H follow-on
  # end-to-end. Auth gate mirrors demo-e2e (UK-4001).
  # ---------------------------------------------------------------------------
  bayes-update-e2e:
    name: bayes_update_module end-to-end (Quantum Bayesian Update Austral JIT + UK-4001)
    runs-on: ubuntu-latest
    steps:
      - name: checkout unfer (sibling layout)
        uses: actions/checkout@v4
        with:
          path: unfer
      - name: checkout australVM (sibling)
        uses: actions/checkout@v4
        with:
          repository: leonardopedro/australVM
          path: australVM
          # token: ${{ secrets.AUSTRALVM_TOKEN }}   # uncomment if private
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            unfer
            australVM/safestos/cranelift
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "4.13"
      - name: install australVM OCaml deps
        working-directory: australVM
        run: opam install . --deps-only --yes || true
      - name: run Bayesian Update module demo
        working-directory: unfer
        run: bash bayes_update_module/run_demo.sh

  # ---------------------------------------------------------------------------
  # Iterated Bayes module gate: the iterated (bayes + SIRK evolve) loop
  # Austral module JIT-creates a `qfm_tomography` model and runs 3
  # iterations of (uk_bayesian_update + uk_get_result + uk_evolve) — the
  # full QFM.tex §7 + §8 pipeline end-to-end. Exercises the iterated
  # posterior flow on real d-dim data. Auth gate mirrors demo-e2e (UK-4001).
  # ---------------------------------------------------------------------------
  iterated-bayes-e2e:
    name: iterated_bayes_module end-to-end (Iterated Quantum Bayesian Update + SIRK JIT + UK-4001)
    runs-on: ubuntu-latest
    steps:
      - name: checkout unfer (sibling layout)
        uses: actions/checkout@v4
        with:
          path: unfer
      - name: checkout australVM (sibling)
        uses: actions/checkout@v4
        with:
          repository: leonardopedro/australVM
          path: australVM
          # token: ${{ secrets.AUSTRALVM_TOKEN }}   # uncomment if private
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            unfer
            australVM/safestos/cranelift
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "4.13"
      - name: install australVM OCaml deps
        working-directory: australVM
        run: opam install . --deps-only --yes || true
      - name: run iterated bayes module demo
        working-directory: unfer
        run: bash iterated_bayes_module/run_demo.sh

  # ---------------------------------------------------------------------------
  # CUDA-on-CI: GPU smoke for the SIRK solver. The 14 CUDA tests in
  # fock_sirk/src/forward_sirk.rs are smoke-tested locally but not in CI.
  # This job is gated on a self-hosted runner with the `gpu` label
  # (no public GPU runner is configured; will only run when a self-hosted
  # runner with the right label is online). The job mirrors qfm-tomo-e2e
  # but enables the `cuda` feature for fock_sirk, exercising the GPU
  # path of the SIRK solver. Closes the P6 D8 gap item ("CUDA toolkit
  # pinning") at the runnable-path level; P9 P12 (toolkit pinning) and
  # P8 P10 (CUDA kernel benchmark) are the next follow-ons.
  # ---------------------------------------------------------------------------
  qfm-tomo-e2e-cuda:
    name: fock_sirk CUDA smoke (self-hosted GPU)
    runs-on: [self-hosted, gpu]
    steps:
      - name: checkout unfer (sibling layout)
        uses: actions/checkout@v4
        with:
          path: unfer
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            unfer
      - name: print GPU info
        run: |
          nvidia-smi
      - name: cargo test (cuda)
        working-directory: unfer
        # On systems with CUDA 12.2 toolkit + CUDA 13 driver coexistence
        # the runtime resolves to /lib/x86_64-linux-gnu; AGENTS.md §5
        # records the LD_LIBRARY_PATH requirement.
        env:
          LD_LIBRARY_PATH: /lib/x86_64-linux-gnu:/usr/lib/x86_64-linux-gnu
        run: cargo test -p fock_sirk --features cuda -- --nocapture
